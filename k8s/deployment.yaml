apiVersion: apps/v1
kind: Deployment
metadata:
  name: shortliner-frontend
  namespace: shortliner
  labels:
    app: shortliner-frontend
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: shortliner-frontend
  template:
    metadata:
      labels:
        app: shortliner-frontend
    spec:
      serviceAccountName: shortliner-frontend
      # Spot Pods for cost savings — safe here since this is stateless and
      # tolerates a restart on preemption.
      nodeSelector:
        cloud.google.com/gke-spot: "true"
      tolerations:
        - key: cloud.google.com/gke-spot
          operator: Equal
          value: "true"
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
        fsGroup: 1001
        runAsUser: 1001
        runAsGroup: 1001
      containers:
        - name: shortliner-frontend
          # Patched by .github/workflows/deploy.yml on every push to master
          # — never edited by hand.
          image: ghcr.io/lukaszsiedlecki/shortliner-frontend:sha-dfb8e16
          ports:
            - containerPort: 3000
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
          env:
            - name: SHORTLINER_BACKEND_URL
              value: "http://shortliner-svc:8080"
            - name: ANALYTICS_BACKEND_URL
              value: "http://shortliner-analytics-svc:8082"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 384Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
