name: Deploy

on:
  push:
    branches: [master]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      short_sha: ${{ steps.sha.outputs.short_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/lukaszsiedlecki/shortliner-frontend:sha-${{ steps.sha.outputs.short_sha }}

  notify-homelab:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch deploy event to homelab
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMELAB_DISPATCH_PAT }}
          repository: lukaszsiedlecki/homelab
          event-type: deploy-image
          client-payload: |-
            {"service": "shortliner-frontend", "tag": "sha-${{ needs.build-and-push.outputs.short_sha }}"}

  deploy:
    # Deploys directly to shortliner-prod (GCP) via Workload Identity
    # Federation — replaces the old repository_dispatch to cloud-infra's
    # promote.yml. Gated by this repo's own "production" environment
    # (required reviewer), same as before.
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Patch image tag
        env:
          TAG: sha-${{ needs.build-and-push.outputs.short_sha }}
        run: |
          yq -i ".spec.template.spec.containers[0].image = \"ghcr.io/lukaszsiedlecki/shortliner-frontend:${TAG}\"" k8s/deployment.yaml

      - name: Commit and push
        env:
          TAG: sha-${{ needs.build-and-push.outputs.short_sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          if git diff --cached --quiet; then
            echo "No changes for ${TAG}, nothing to commit"
          else
            git commit -m "chore: deploy ${TAG} to shortliner-prod"
            git push
          fi

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.GH_DEPLOYER_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials shortliner-cluster \
            --zone europe-central2-a --project shortliner-prod

      - name: Apply to cluster
        run: |
          kubectl apply -f k8s/
          kubectl -n shortliner rollout status deployment shortliner-frontend --timeout=300s
